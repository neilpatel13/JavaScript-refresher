<!DOCTYPE html>
<html lang="en">

    <title>Variables</title>
    <style>

<body>
   <!-- ddd -->

    <script>
        //test
        let var1 = 3;
        console.log(var1);

        let calculation = 2+2;
        console.log(calculation);
        console.log(calculation+2);
        console.log('calc = ' + calculation);

        let result = calculation + 2;
        console.log(result);
        let message = "hello";
        console.log(message);

        var1 = 5;
        console.log(var1);
        var1 = var1 + 1;
        console.log(var1);
        // differences between let / const / var for creating variables
        //const is for creating variables that you won't change its value
        
        const name = "Bobby"
        const age = 21;

        console.log(`Our friend is ${name} and he is ${age} years old `)
    </script>
</body>
