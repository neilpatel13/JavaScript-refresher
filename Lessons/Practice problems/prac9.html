<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button>9a</button>
    <button class="js-9b">9b</button>

    <button class="js-head" onclick="
        headclick();
    ">heads</button>

    <button class="js-tail" onclick="
        tailclick();
    ">tails</button>

    <p class="res"></p>

    <script>
        //9a
        console.log(document.querySelector('button'))
        //9b
        document.querySelector('.js-9b')
            .innerHTML = "9b done";

        function headclick() {
            document.querySelector('.res')
                .innerHTML = "You clicked heads"
        }
        function tailclick() {
            document.querySelector('.res')
                .innerHTML = "You clicked tails"
        }
        
    </script>
</body>
</html>
