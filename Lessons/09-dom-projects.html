<!DOCTYPE html>
<html lang="en">
<head>
    <title>DOM Projects</title>
    <style>
             
    </style>
</head>
<body>
   <!-- ddd -->

   <p>Youtube Subcribe Button</p>
   <button onclick="
    subscribe();
   " class="js-sub-button">Subscribe</button>
    
   <p>Amazon Shipping Calculator</p>
   <input placeholder="Cost of order" class="js-cost-of-order" onkeydown="
    handleCostKeyDown(event);
   ">
   <button onclick="
    calculateTotal();
   ">Calculate</button>
   <p class="js-total-cost"></p>

    <script>
        //test

        window.document
        window.console.log('window')
        window.alert


        function subscribe() {
            const buttonElement = document.querySelector('.js-sub-button');

            if(buttonElement.innerText === 'Subscribe') {
                buttonElement.innerHTML = 'Subscribed'
            }else {
                buttonElement.innerHTML = 'Subscribe'
            }
        }

        function calculateTotal() {
            const inputElement = document.querySelector('.js-cost-of-order');
            let cost = Number(inputElement.value);

            if(cost < 40){
                cost += 10
            }
            
            document.querySelector('.js-total-cost')
                .innerHTML = `$${cost}`
        }

        function handleCostKeyDown(event){
            if(event.key === 'Enter'){
                calculateTotal();
            }
        }

    </script>
</body>
</html>
