<!DOCTYPE html>
<html lang="en">
<head>
    <title>RPS</title>
    <style>
             
    </style>
</head>
<body>
    <!-- ddd -->

    <p>Rock Paper Scissors</p>
    <button onclick="
       playgame('rock');
    ">Rock</button>
    
    <button onclick="
       playgame('paper');
    ">Paper</button>
    
    <button onclick="
       playgame('scissors');
    ">Scissors</button>


    <script>
        //test
        function playgame(playerMove){
          const compMove = pickComputerMove();

          let res = '';

          if (playerMove === 'scissors') {
            if (compMove === 'rock') {
              res = 'You lose';
            }else if (compMove === 'paper') {
              res = 'You win!';
            }else if (compMove === 'scissors') {
              res = 'Tie';
            }

          } else if(playerMove === 'paper') {
            if (compMove === 'rock') {
              res = 'You win!';
            }else if (compMove === 'paper') {
              res = 'Tie.';
            }else if (compMove === 'scissors') {
              res = 'You lose.';
            }

          } else if (playerMove === 'rock') {
            if (compMove === 'rock') {
              res = 'Tie';
            }else if (compMove === 'paper') {
              res = 'You lose.';
            }else if (compMove === 'scissors') {
              res = 'You win!';
            }
            
          }

          alert(`You picked ${playerMove}. Computer picked ${compMove}. ${res}`)

        }

        function pickComputerMove(){
          const ranNum = Math.random();
          let compMove = '';

          if (ranNum >= 0 && ranNum < 1/3) {
            compMove = 'rock';
          } else if (ranNum >= 1/3 && ranNum < 2/3) {
            compMove = 'paper' ;
          } else if (ranNum >= 2/3 && ranNum < 1) {
            compMove = 'scissors' ;
          }
        
          return compMove;
        }

    </script>
</body>
</html>
