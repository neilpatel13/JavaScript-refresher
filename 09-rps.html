<!DOCTYPE html>
<html lang="en">
<head>
    <title>RPS</title>
    <style>
             
    </style>
</head>
<body>
    <!-- ddd -->

    <p>Rock Paper Scissors</p>
    <button onclick="
       playgame('rock');
    ">Rock</button>
    
    <button onclick="
       playgame('paper');
    ">Paper</button>
    
    <button onclick="
       playgame('scissors');
    ">Scissors</button>

    <p class="js-results"></p>
    <p class="js-moves"></p>

    <p class="js-score"></p>

    <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      updateScore();
    ">Reset Score</button>


    <script>
        //test
        let score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0,
            ties: 0
          };

        updateScore();

        /* if(!score) {
          score = {
            wins: 0,
            losses: 0,
            ties: 0
          };
        } */

        function playgame(playerMove){
          const compMove = pickComputerMove();

          let res = '';

          if (playerMove === 'scissors') {
            if (compMove === 'rock') {
              res = 'You lose';
            }else if (compMove === 'paper') {
              res = 'You win!';
            }else if (compMove === 'scissors') {
              res = 'Tie';
            }

          } else if(playerMove === 'paper') {
            if (compMove === 'rock') {
              res = 'You win!';
            }else if (compMove === 'paper') {
              res = 'Tie';
            }else if (compMove === 'scissors') {
              res = 'You lose';
            }

          } else if (playerMove === 'rock') {
            if (compMove === 'rock') {
              res = 'Tie';
            }else if (compMove === 'paper') {
              res = 'You lose';
            }else if (compMove === 'scissors') {
              res = 'You win!';
            }
            
          }

          if(res === 'You win!') {
            score.wins += 1;
          } else if (res === 'You lose') {
            score.losses += 1;
          } else if (res === 'Tie') {
            score.ties += 1;
          }

          localStorage.setItem('score', JSON.stringify(score));

          updateScore()

          document.querySelector('.js-results')
            .innerHTML = res;
        
          document.querySelector('js-moves')
            .innerHTML = `You ${playerMove} - ${compMove} Computer`;

        }

        function updateScore(){
            document.querySelector('.js-score')
            .innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
        }

        function pickComputerMove(){
          const ranNum = Math.random();
          let compMove = '';

          if (ranNum >= 0 && ranNum < 1/3) {
            compMove = 'rock';
          } else if (ranNum >= 1/3 && ranNum < 2/3) {
            compMove = 'paper' ;
          } else if (ranNum >= 2/3 && ranNum < 1) {
            compMove = 'scissors' ;
          }
        
          return compMove;
        }

        //4.43.05 P8
    </script>
</body>
</html>
