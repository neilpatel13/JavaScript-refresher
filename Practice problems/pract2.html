        function weather(degreeCel){
            let DegreeFar = (degreeCel * 9/5) + 32
            console.log(DegreeFar)
        }
        weather(100) 

        function weather2(DegreeFar) {
            let degreeCel = (DegreeFar - 32) * 5/9
            console.log(degreeCel)
        }
        weather2(100)

        function weatherall (deg, type) {
            if(type === 'C'){
                let convertdeg = (deg * 9/5) + 32
                console.log(convertdeg)
            } else if (type === 'F') {
                let convertdeg = (deg - 32) * 5/9
                console.log(convertdeg)
            }
        }
        weatherall(100, 'F')
